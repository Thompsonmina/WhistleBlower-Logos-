name: ci

on:
  push:
    branches: [master, main]
  pull_request:

# What this workflow covers (and doesn't):
#
#   ✓ chronicle_registry_core — pure Rust shared types. Builds in <2 min.
#   ✓ batch-anchor — the off-chain CID watcher / on-chain anchoring CLI.
#                    Builds and runs unit tests.
#   ✓ rustfmt for both crate trees.
#
#   ✗ examples/    — depends on spel-framework + nssa_core, which pull in
#                    logos-blockchain-pol. That crate's build.rs needs the
#                    LOGOS_BLOCKCHAIN_CIRCUITS artifact bundle (multi-GB,
#                    not on a fresh runner). Built locally via cargo.
#   ✗ methods/guest — risc0 zkVM guest. Needs the risc0 toolchain + docker.
#                     Built locally via `make build`.
#   ✗ ffi/         — chronicle FFI .so. Same LEZ-deps issue as examples/.
#                    Built locally via `make ffi`; binary committed under
#                    logos-chronicle/vendored/.
#   ✗ nix flake    — exercised via `./scripts/run-app.sh` and the
#                    `nix run .#smoke-*` apps locally.

jobs:
  build:
    name: cargo build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            batch-anchor/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build (chronicle_registry_core)
        run: cargo build -p chronicle_registry_core

      - name: cargo build (batch-anchor)
        working-directory: batch-anchor
        run: cargo build --bin batch-anchor

      - name: cargo test (batch-anchor)
        working-directory: batch-anchor
        run: cargo test

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: fmt (chronicle-registry workspace)
        run: cargo fmt --all -- --check
      - name: fmt (batch-anchor)
        working-directory: batch-anchor
        run: cargo fmt --all -- --check
