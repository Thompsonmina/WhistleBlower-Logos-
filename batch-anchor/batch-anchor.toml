[delivery]
rest_url             = "http://127.0.0.1:8645"
content_topic        = "/chronicle/1/document-index/json"
poll_ms              = 1000
# How far back to query nwaku's store-protocol on startup to recover
# messages broadcast while the anchor was down.  Set to 0 to disable.
store_lookback_hours = 24

[registry]
spel_toml         = "../spel.toml"
sequencer_url     = "http://127.0.0.1:3040"
wallet_home       = "../.scaffold/wallet"
signer_account_id = "HzwmtcTKfwXGjPpUvDxg3GoqtGVSLpzPnbKw7kqz4TS3"
# 64-char hex program ID of the deployed chronicle-registry. Pinning this
# means we don't recompute it from the guest binary on every CLI call —
# the tool always submits to *this* registry, even if the local binary
# is rebuilt or missing. Run `make inspect` (or `--dry-run`) after a
# fresh deploy to capture the current ID.
program_id        = "6ac5aa11b87bcd1961c7b5294b8d01e8746b2103e3beb665202a0299d2cf0252"

[batch]
max_size      = 50
flush_after_s = 30

[node]
# docker-compose file managing the local nwaku node.
compose_file = "docker-compose.yml"
